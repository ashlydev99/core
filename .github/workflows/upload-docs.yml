name: Build & deploy documentation on rs.nexus.chat, c.nexus.chat, py.nexus.chat and cffi.nexus.chat

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  build-rs:
    runs-on: ubuntu-latest
    environment:
      name: rs.nexus.chat
      url: https://rs.nexus.chat/

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
      - name: Build the documentation with cargo
        run: |
          cargo doc --package nexuschat --no-deps --document-private-items
      - name: Upload to rs.nexus.chat
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.RS_DOCS_SSH_KEY }}" > "$HOME/.ssh/key"
          chmod 600 "$HOME/.ssh/key"
          rsync -avzh -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/target/doc "${{ secrets.RS_DOCS_SSH_USER }}@rs.nexus.chat:/var/www/html/rs.nexus.chat/"

  build-python:
    runs-on: ubuntu-latest
    environment:
      name: py.nexus.chat
      url: https://py.nexus.chat/

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
          fetch-depth: 0 # Fetch history to calculate VCS version number.
      - uses: cachix/install-nix-action@2126ae7fc54c9df00dd18f7f18754393182c73cd # v31.9.1
      - name: Build Python documentation
        run: nix build .#python-docs
      - name: Upload to py.nexus.chat
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.PY_DOCS_SSH_KEY }}" > "$HOME/.ssh/key"
          chmod 600 "$HOME/.ssh/key"
          rsync -avzh --delete -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/result/html/ "${{ secrets.PY_DOCS_SSH_USER }}@py.nexus.chat:/var/www/html/py.nexus.chat"

  build-c:
    runs-on: ubuntu-latest
    environment:
      name: c.nexus.chat
      url: https://c.nexus.chat/

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
          fetch-depth: 0 # Fetch history to calculate VCS version number.
      - uses: cachix/install-nix-action@2126ae7fc54c9df00dd18f7f18754393182c73cd # v31.9.1
      - name: Build C documentation
        run: nix build .#docs
      - name: Upload to c.nexus.chat
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.C_DOCS_SSH_KEY }}" > "$HOME/.ssh/key"
          chmod 600 "$HOME/.ssh/key"
          rsync -avzh --delete -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/result/html/ "${{ secrets.C_DOCS_SSH_USER }}@c.nexus.chat:/var/www/html/c.nexus.chat"

  build-ts:
    runs-on: ubuntu-latest
    environment:
      name: js.jsonrpc.nexus.chat
      url: https://js.jsonrpc.nexus.chat/

    defaults:
      run:
        working-directory: ./nexuschat-jsonrpc/typescript

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
          fetch-depth: 0 # Fetch history to calculate VCS version number.
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: npm install
        run: npm install
      - name: npm run build
        run: npm run build
      - name: Run docs script
        run: npm run docs
      - name: Upload to js.jsonrpc.nexus.chat
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.JS_JSONRPC_DOCS_SSH_KEY }}" > "$HOME/.ssh/key"
          chmod 600 "$HOME/.ssh/key"
          rsync -avzh --delete -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/nexuschat-jsonrpc/typescript/docs/ "${{ secrets.JS_JSONRPC_DOCS_SSH_USER }}@js.jsonrpc.nexus.chat:/var/www/html/js.jsonrpc.nexus.chat/"

  build-cffi:
    runs-on: ubuntu-latest
    environment:
      name: cffi.nexus.chat
      url: https://cffi.nexus.chat/

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
      - name: Build the documentation with cargo
        run: |
          cargo doc --package nexuschat_ffi --no-deps
      - name: Upload to cffi.nexus.chat
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.CFFI_DOCS_SSH_KEY }}" > "$HOME/.ssh/key"
          chmod 600 "$HOME/.ssh/key"
          rsync -avzh --delete -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/target/doc/ "${{ secrets.CFFI_DOCS_SSH_USER }}@nexus.chat:/var/www/html/cffi.nexus.chat/"
